<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/deucalion-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- $DEUCALION__PAGETITLE -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Inter:wght@300..600&family=JetBrains+Mono:wght@400..600&family=IBM+Plex+Sans:wght@400..600&family=IBM+Plex+Mono:wght@400..600&family=Space+Grotesk:wght@400..600&family=Space+Mono:wght@400..600&display=swap" rel="stylesheet">

    <script>
      (function() {
        /* Read tweaks-store theme to set data-theme before stylesheets load,
           avoiding a flash of unstyled content. Falls back to system preference. */
        try {
          var stored = localStorage.getItem('deucalion.tweaks');
          var theme = null;
          if (stored) {
            try { theme = JSON.parse(stored).theme; } catch (e) { /* ignore */ }
          }
          if (!theme) {
            var legacy = localStorage.getItem('theme');
            if (legacy === 'dark' || legacy === 'light') theme = legacy;
          }
          if (!theme) {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
    <style>
      /* Critical inline styles for the splash. The Tailwind/V5 stylesheet
         lands on first JS execution; before that, we still want a dark/light
         page that matches the design tokens — no flash of unstyled content. */
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body {
        font-family: "IBM Plex Sans", "Inter", system-ui, -apple-system, sans-serif;
      }
      html { background: oklch(0.18 0.012 230); }
      html[data-theme="light"] { background: oklch(0.985 0.003 230); }

      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2147483647;
        transition: opacity 0.4s ease-out;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash-icon {
        width: 28em;
        height: 28em;
        object-fit: contain;
        /* v4 emboss recipe (matches .brand-icon in the topbar): keep the
           icon BLACK in both themes and bevel the silhouette with layered
           directional shadows (down-right dark + up-left highlight). The
           1px shadows used at 44px scale to ~5px at this 14em size. */
        filter:
          drop-shadow(5px 5px 4px rgba(0, 0, 0, 0.7))
          drop-shadow(-5px -5px 4px rgba(255, 255, 255, 0.35));
        animation: splash-pulse 2.4s ease-in-out infinite;
      }
      html[data-theme="light"] #splash-icon {
        filter:
          drop-shadow(5px 5px 4px rgba(0, 0, 0, 0.3))
          drop-shadow(-5px -5px 4px rgba(0, 0, 0, 0.5));
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%      { opacity: 0.55; transform: scale(0.9); }
      }
    </style>
  </head>
  <body>
    <div id="splash" role="status" aria-live="polite" aria-label="Waiting for backend">
      <img id="splash-icon" src="/assets/deucalion-icon.svg" alt="" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
